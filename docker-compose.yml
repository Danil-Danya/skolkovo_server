  TG_BOT_API_BASE_URL: http://138.249.7.93:3001
  TG_BOT_API_TOKEN: jhsdfgkfdsjgfdsigfsdiogsdffgdt45.unjkghfsd8432tnjdksfhg89345w12sdlkfhasd.uir8916b7tubys7ehjasdhjgafd
  SERVER_API_TOKEN: 8dfjkhsdf89s7dfh98sdf7h98s7dfh98sdf798sdfh987sdfh987sdfh987sdfh

services:
  db:
    image: postgres:17
    container_name: skolkovo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1
      POSTGRES_DB: skolkovo
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d skolkovo"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    image: skolkovo-api:local
    build: *app-build
    container_name: skolkovo-migrate
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *app-environment
      MIGRATION_MAX_RETRIES: 12
      MIGRATION_RETRY_DELAY_MS: 5000
    command: ["node", "docker/run-migrations.js"]

  app:
    image: skolkovo-api:local
    build: *app-build
    container_name: skolkovo-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *app-environment
    ports:
      - "3400:3400"
    volumes:
      - static_data:/app/static

  event-status-worker:
    image: skolkovo-api:local
    build: *app-build
    container_name: skolkovo-event-status-worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *app-environment
    command: ["node", "dist/src/event-status-worker.js"]

volumes:
  postgres_data:
  static_data:
